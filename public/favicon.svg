<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep red -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4136"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>

    <!-- Top-left light source -->
    <radialGradient id="light" cx="0.25" cy="0.15" r="0.85">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Inner shadow -->
    <radialGradient id="inner-shadow" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="rgba(0,0,0,0.2)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- Bar gradient: white with depth -->
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.25)"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.72)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.42)"/>
    </linearGradient>

    <!-- Glass edge highlight -->
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Bar shadow -->
    <filter id="bar-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>

    <!-- Subtle glow behind bars -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Base shape: iOS rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Inner shadow (bottom) -->
  <rect width="512" height="512" rx="112" fill="url(#inner-shadow)"/>

  <!-- Top-left light -->
  <rect width="512" height="512" rx="112" fill="url(#light)"/>

  <!-- Subtle glow behind chart -->
  <g filter="url(#glow)" opacity="0.35">
    <rect x="128" y="150" width="60" height="180" rx="8" fill="white"/>
    <rect x="218" y="100" width="76" height="260" rx="8" fill="white"/>
    <rect x="324" y="200" width="60" height="140" rx="8" fill="white"/>
  </g>

  <!-- Chart bars with depth -->
  <g filter="url(#bar-shadow)">
    <!-- Bar 1: Short (left) -->
    <rect x="128" y="268" width="56" height="120" rx="12" fill="url(#bar1)"/>
    <!-- Bar 1 highlight edge -->
    <rect x="128" y="268" width="56" height="120" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Bar 2: Tall (center) — hero bar -->
    <rect x="218" y="148" width="76" height="240" rx="14" fill="url(#bar2)"/>
    <!-- Bar 2 highlight edge -->
    <rect x="218" y="148" width="76" height="240" rx="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Bar 2 inner glass shine -->
    <rect x="222" y="152" width="30" height="80" rx="8" fill="rgba(255,255,255,0.12)"/>

    <!-- Bar 3: Medium (right) -->
    <rect x="328" y="218" width="56" height="170" rx="12" fill="url(#bar3)"/>
    <!-- Bar 3 highlight edge -->
    <rect x="328" y="218" width="56" height="170" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>

  <!-- Glass edge on icon border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
</svg>
